<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Kamil Dzieniszewski</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --accent: #ff6b35;
      --bg-body: #080808;
      --bg-term: #0d0d0d;
      --bg-title: #141414;
      --border: #2a2a2a;
      --text: #c8c8c8;
      --text-bright: #e0e0e0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-body);
      color: var(--text);
      font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
      min-height: 100vh;
      padding: 40px 24px 120px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 40px;
      opacity: 0.8;
      transition: opacity 0.15s;
    }
    .back:hover { opacity: 1; }

    h1 {
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 12px;
      color: #555;
      margin-bottom: 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .photo-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg-term);
      transition: border-color 0.2s, transform 0.2s;
    }
    .photo-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .photo-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .photo-card .caption {
      padding: 12px 14px;
      font-size: 12px;
      color: var(--text);
      border-top: 1px solid var(--border);
    }
    .photo-card .caption .tag {
      font-size: 10px;
      color: #555;
      margin-top: 3px;
    }

    /* placeholder cards */
    .photo-placeholder {
      border: 1px dashed #2a2a2a;
      border-radius: 10px;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #333;
      font-size: 12px;
    }
    .photo-placeholder span { font-size: 24px; opacity: 0.4; }

    /* dock */
    .dock {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(13,13,13,0.85);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 10px 20px;
      backdrop-filter: blur(12px);
      font-size: 12px;
      color: #555;
    }
    .dock a { color: var(--accent); text-decoration: none; }
    .dock a:hover { text-decoration: underline; }
  </style>
</head>
<body>
